<!doctype html>
<html lang="de" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ccview</title>
<style>
  /* ---------- Themes ---------- */
  :root, [data-theme="dark"] {
    --bg: #181818;
    --fg: #e4e4e4;
    --muted: #888;
    --border: #2a2a2a;
    --user-bg: #1e212a;
    --user-border: #3a4458;
    --assistant-bg: #1c2421;
    --assistant-border: #2e4a3a;
    --tool-bg: #21222a;
    --tool-border: #3a3d4a;
    --tool-accent: #bda8f3;
    --result-bg: #14161b;
    --result-border: #282c36;
    --error-border: #7a3030;
    --error-badge-bg: #3a1818;
    --error-fg: #e37070;
    --success-fg: #7acb7a;
    --diff-minus: #d37070;
    --diff-plus: #7acb7a;
    --code-bg: #0f1116;
    --code-fg: #d6dae3;
    --panel-bg: #1f1f1f;
    --status-bg: #252525;
    --strong-color: #f0ead6;
    --link: #89b0ff;
    --highlight: #3a3a50;
  }
  [data-theme="light"] {
    --bg: #ffffff;
    --fg: #1a1a1a;
    --muted: #6a6a6a;
    --border: #e4e4e4;
    --user-bg: #f3f6fb;
    --user-border: #c8d5e8;
    --assistant-bg: #f3faf5;
    --assistant-border: #bbdac3;
    --tool-bg: #f3f3f7;
    --tool-border: #d4d8e0;
    --tool-accent: #6a3fcc;
    --result-bg: #fafafa;
    --result-border: #e0e0e0;
    --error-border: #e89090;
    --error-badge-bg: #fbe6e6;
    --error-fg: #a33030;
    --success-fg: #2e7d32;
    --diff-minus: #a33030;
    --diff-plus: #2e7d32;
    --code-bg: #f2f2f4;
    --code-fg: #2a2a2a;
    --panel-bg: #f7f7f7;
    --status-bg: #f0f0f0;
    --strong-color: #1a1a1a;
    --link: #2a5dc8;
    --highlight: #e8ecf5;
  }
  [data-theme="sepia"] {
    --bg: #f5edd6;
    --fg: #3b2e1e;
    --muted: #8a7758;
    --border: #d6c9a9;
    --user-bg: #ece2c4;
    --user-border: #c4a67e;
    --assistant-bg: #e8e2c4;
    --assistant-border: #a8a174;
    --tool-bg: #ecdfba;
    --tool-border: #c9b98a;
    --tool-accent: #6e4012;
    --result-bg: #efe6c8;
    --result-border: #c9b98a;
    --error-border: #b05050;
    --error-badge-bg: #e8cfc0;
    --error-fg: #8a2020;
    --success-fg: #4a6024;
    --diff-minus: #8a2020;
    --diff-plus: #4a6024;
    --code-bg: #e8dfc0;
    --code-fg: #3b2e1e;
    --panel-bg: #ece1be;
    --status-bg: #e6dcbe;
    --strong-color: #3b2e1e;
    --link: #7a3a10;
    --highlight: #d8c89a;
  }

  /* ---------- Base ---------- */
  :root { --toolbar-h: 36px; --favbar-h: 36px; --bottombar-h: 36px; --chrome-h: 72px; /* toolbar + favbar */ }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
  html { scroll-padding-top: calc(var(--chrome-h) + 12px); }
  body {
    font: 14px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    transition: background 0.2s, color 0.2s;
  }

  /* ---------- Toolbar ---------- */
  .toolbar {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--toolbar-h);
    display: flex; justify-content: space-between; align-items: center;
    gap: 12px;
    padding: 0 12px;
    background: var(--status-bg);
    border-bottom: 1px solid var(--border);
    z-index: 100;
    font-size: 11px;
  }
  .toolbar-left { display: flex; gap: 12px; align-items: center; }
  .toolbar-right { display: flex; gap: 12px; align-items: center; position: relative; }

  /* Burger menu */
  .menu-toggle {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    line-height: 1;
  }
  .menu-toggle:hover { color: var(--fg); border-color: var(--fg); }
  .menu-toggle.open { color: var(--fg); border-color: var(--fg); }
  .menu-items {
    position: absolute;
    top: calc(var(--toolbar-h) + 2px);
    right: 0;
    background: var(--status-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.25);
    min-width: 200px;
    z-index: 200;
    display: none;
  }
  .menu-items.open { display: block; }
  .menu-items button {
    display: block;
    width: 100%;
    text-align: left;
    padding: 8px 14px;
    background: none;
    border: none;
    color: var(--fg);
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
  }
  .menu-items button:hover { background: var(--highlight); }
  .menu-items .sep { height: 1px; background: var(--border); margin: 2px 0; }

  .brand-stats { color: var(--muted); font-size: 10px; margin-left: 4px; }

  /* Search bar */
  .searchbar {
    position: fixed;
    top: calc(var(--chrome-h) + 2px);
    left: 240px;
    right: 24px;
    max-width: 620px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--status-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    z-index: 90;
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
  }
  .searchbar[hidden] { display: none; }
  body.sp-collapsed .searchbar { left: 48px; }
  .searchbar input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--fg);
    padding: 5px 10px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 13px;
    outline: none;
  }
  .searchbar input:focus { border-color: var(--tool-accent); }
  .searchbar .count { color: var(--muted); font-size: 11px; min-width: 70px; text-align: right; }
  .searchbar button {
    background: none; border: 1px solid var(--border); color: var(--muted);
    cursor: pointer; font-size: 14px; padding: 2px 8px; border-radius: 3px;
    font-family: inherit; line-height: 1;
  }
  .searchbar button:hover { color: var(--fg); border-color: var(--fg); }

  /* Jump-to-live pill */
  .jump-live {
    position: fixed;
    bottom: calc(var(--bottombar-h) + 14px);
    right: 28px;
    background: var(--tool-accent);
    color: #111;
    border: none;
    padding: 8px 16px;
    border-radius: 999px;
    cursor: pointer;
    z-index: 90;
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    box-shadow: 0 6px 16px rgba(0,0,0,0.3);
    display: none;
  }
  .jump-live.visible { display: block; }
  [data-theme="light"] .jump-live { color: #fff; }
  [data-theme="sepia"] .jump-live { color: #fff; }

  /* Prompt filter input */
  .prompt-filter {
    display: block;
    width: calc(100% - 16px);
    margin: 0 8px 8px 8px;
    padding: 4px 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--fg);
    border-radius: 4px;
    font-family: inherit;
    font-size: 11px;
    outline: none;
  }
  .prompt-filter:focus { border-color: var(--tool-accent); }

  /* Modal (about) */
  .modal { position: fixed; inset: 0; z-index: 300; }
  .modal[hidden] { display: none; }
  .modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.55); }
  .modal-body {
    position: relative;
    max-width: 440px;
    margin: 14vh auto 0;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 22px 26px 18px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .modal-body h2 { margin: 0 0 4px 0; font-size: 18px; }
  .modal-body h2 .ver { color: var(--muted); font-size: 12px; font-weight: 400; margin-left: 6px; }
  .modal-body p { margin: 10px 0; font-size: 13px; }
  .modal-body ul { list-style: none; padding: 0; margin: 10px 0 14px 0; }
  .modal-body ul li {
    margin: 4px 0;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
    font-size: 12px;
  }
  .modal-body ul li a { color: var(--link); text-decoration: none; }
  .modal-body ul li a:hover { text-decoration: underline; }
  .modal-body .modal-license { color: var(--muted); font-size: 11px; margin-top: 14px; }
  .modal-body .modal-close {
    margin-top: 12px;
    background: var(--tool-accent);
    color: #101010;
    border: none;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
  }
  [data-theme="light"] .modal-body .modal-close,
  [data-theme="sepia"] .modal-body .modal-close { color: #fff; }
  .brand { font-weight: 600; letter-spacing: 0.04em; color: var(--muted); }
  .theme-switch { display: inline-flex; gap: 4px; }
  .theme-switch button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.02em;
  }
  .theme-switch button:hover { color: var(--fg); border-color: var(--fg); }
  .theme-switch button.active { color: var(--fg); background: var(--bg); border-color: var(--fg); }
  .status { color: var(--muted); letter-spacing: 0.04em; }
  .status.ok { color: var(--success-fg); }
  .status.err { color: var(--error-fg); }

  /* ---------- Side panel (prompt index) ---------- */
  .sidepanel {
    position: fixed;
    top: var(--toolbar-h); left: 0; bottom: 0;
    width: 220px;
    background: var(--panel-bg);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 10px 6px;
    font-size: 12px;
    transition: width 0.15s;
  }
  body.sp-collapsed .sidepanel { width: 28px; padding: 10px 2px; overflow: hidden; }
  body.sp-collapsed .sidepanel h2,
  body.sp-collapsed .sidepanel #promptList { display: none; }
  .sidepanel-toggle {
    display: block;
    width: 100%;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 0 8px 0;
    font-family: inherit;
    line-height: 1;
  }
  .sidepanel-toggle:hover { color: var(--fg); }
  .sidepanel h2 {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin: 0 0 8px 10px;
    font-weight: 600;
  }
  .sidepanel-tabs {
    display: flex;
    gap: 2px;
    padding: 0 6px 8px 6px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 6px;
  }
  .sidepanel-tabs button {
    flex: 1;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 6px;
    border-radius: 4px;
    font-size: 10px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .sidepanel-tabs button:hover { color: var(--fg); }
  .sidepanel-tabs button.active {
    color: var(--fg);
    background: var(--bg);
    border-color: var(--fg);
  }
  .session-item {
    display: block;
    padding: 6px 10px;
    color: var(--fg);
    text-decoration: none;
    border-radius: 4px;
    font-size: 11px;
    line-height: 1.4;
    margin-bottom: 4px;
    border: 1px solid transparent;
  }
  .session-item { cursor: pointer; }
  .session-item:hover { background: var(--highlight); }
  .session-item.current { border-color: var(--tool-accent); }
  .session-item.today { box-shadow: 0 0 0 1px var(--success-fg) inset; }
  .session-item.today.current { box-shadow: 0 0 0 1px var(--tool-accent) inset; }
  .session-item .session-id {
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
    color: var(--muted);
    font-size: 10px;
    display: flex; justify-content: space-between;
  }
  .session-item .session-id .current-badge {
    color: var(--tool-accent);
    font-weight: 600;
  }
  .session-item .session-preview {
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .session-item .session-date {
    color: var(--muted);
    font-size: 10px;
    margin-top: 2px;
  }
  body.sp-collapsed .sidepanel-tabs { display: none; }

  /* ---------- Favorites bar ---------- */
  .favbar {
    position: fixed;
    top: var(--toolbar-h);
    left: 220px;
    right: 0;
    height: var(--favbar-h);
    display: flex;
    gap: 6px;
    padding: 4px 10px;
    background: var(--panel-bg);
    border-bottom: 1px solid var(--border);
    z-index: 50;
    overflow-x: auto;
    align-items: center;
    transition: left 0.15s;
  }
  body.sp-collapsed .favbar { left: 28px; }
  .favbar-empty { color: var(--muted); font-size: 11px; font-style: italic; }
  .fav-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 4px 3px 10px;
    background: var(--tool-bg);
    border: 1px solid var(--tool-border);
    border-radius: 999px;
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
    max-width: 240px;
    flex: 0 0 auto;
  }
  .fav-chip:hover { border-color: var(--fg); }
  .fav-chip.active { border-color: var(--tool-accent); background: var(--bg); }
  .fav-chip.updated {
    background: #c8f0c8;
    color: #1a1a1a;
    border-color: #6fb96f;
  }
  [data-theme="light"] .fav-chip.updated { background: #d6f5d6; }
  [data-theme="sepia"] .fav-chip.updated { background: #d0e8a8; color: #3b2e1e; border-color: #7a9a48; }
  .fav-chip .fav-short {
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
    color: var(--muted);
  }
  .fav-chip.updated .fav-short { color: #2a2a2a; }
  .fav-chip .fav-body {
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 140px;
  }
  .fav-chip .fav-unpin {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    padding: 0 4px;
    line-height: 1;
    border-radius: 50%;
  }
  .fav-chip .fav-unpin:hover { color: var(--error-fg); background: rgba(0,0,0,0.08); }
  [data-theme="light"] .fav-chip .fav-unpin:hover { background: rgba(0,0,0,0.06); }

  /* Pin + main buttons on session-item */
  .session-item { position: relative; padding-right: 52px; }
  .session-item .pin-btn,
  .session-item .main-btn {
    position: absolute;
    top: 4px;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 3px;
  }
  .session-item .pin-btn  { right: 6px; }
  .session-item .main-btn { right: 30px; }
  .session-item .pin-btn:hover  { color: var(--tool-accent); }
  .session-item .main-btn:hover { color: #5bb6e8; }
  .session-item .pin-btn.pinned { color: var(--tool-accent); }
  .session-item .main-btn.active { color: #5bb6e8; }
  .session-item.is-main {
    border-color: #5bb6e8;
    box-shadow: 0 0 0 1px #5bb6e8 inset;
  }

  /* ---------- Hover popup ---------- */
  .popup {
    position: fixed;
    background: var(--status-bg);
    color: var(--fg);
    border: 1px solid var(--border);
    padding: 10px 12px;
    border-radius: 6px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
    max-width: 420px;
    min-width: 220px;
    font-size: 12px;
    line-height: 1.5;
    z-index: 200;
    pointer-events: none;
    white-space: pre-wrap;
    word-break: break-word;
    display: none;
  }
  .popup.visible { display: block; }
  .popup .popup-meta {
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }
  .popup .popup-body { color: var(--fg); }
  .popup .popup-cmd {
    margin-top: 8px;
    padding: 6px 8px;
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
    font-size: 11px;
    color: var(--code-fg);
  }

  /* Session-item refinements for the flat multi-project list */
  .session-item .session-project {
    color: var(--muted);
    font-size: 10px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .session-item.same-project .session-project { color: var(--tool-accent); }
  .sidepanel-item {
    display: block;
    padding: 5px 10px;
    color: var(--fg);
    text-decoration: none;
    border-radius: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
    font-size: 11px;
    line-height: 1.5;
  }
  .sidepanel-item:hover { background: var(--highlight); }
  .sidepanel-item .num { color: var(--muted); margin-right: 8px; }
  .sidepanel-empty { color: var(--muted); padding: 10px; font-style: italic; font-size: 11px; }

  /* ---------- Events ---------- */
  .container {
    max-width: 860px;
    margin: 0 auto 0 220px;
    padding: calc(var(--chrome-h) + 12px) 24px calc(var(--bottombar-h) + 32px);
    transition: margin-left 0.15s;
  }
  body.sp-collapsed .container { margin-left: 28px; }

  /* Bottom command bar */
  .bottombar {
    position: fixed;
    bottom: 0; left: 220px; right: 0;
    height: var(--bottombar-h);
    display: flex;
    gap: 6px;
    padding: 0 12px;
    background: var(--status-bg);
    border-top: 1px solid var(--border);
    align-items: center;
    z-index: 80;
    font-size: 11px;
    transition: left 0.15s;
  }
  body.sp-collapsed .bottombar { left: 28px; }
  .bottombar button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    line-height: 1;
  }
  .bottombar button:hover { color: var(--fg); border-color: var(--fg); }
  .bottombar button.active { color: var(--tool-accent); border-color: var(--tool-accent); }
  .bottombar .spacer { flex: 1; }
  .bottombar .hint { color: var(--muted); font-size: 10px; }
  .event {
    margin-bottom: 22px;
    padding: 14px 18px;
    border-radius: 10px;
    border: 1px solid var(--border);
    scroll-margin-top: calc(var(--chrome-h) + 12px);
  }
  .event.user { background: var(--user-bg); border-color: var(--user-border); }
  .event.assistant { background: var(--assistant-bg); border-color: var(--assistant-border); }
  .event.user.prompt {
    border-left: 4px solid var(--tool-accent);
    padding-left: 14px;
  }
  .event.user.prompt .event-label {
    color: var(--tool-accent);
    font-weight: 700;
  }
  .event.user.tool-context {
    background: var(--result-bg);
    border-color: var(--border);
    opacity: 0.9;
  }
  .event.user.tool-context .event-label {
    color: var(--muted);
    font-style: italic;
    text-transform: none;
    letter-spacing: 0;
  }
  .event.assistant .event-label {
    color: var(--assistant-border);
    font-weight: 600;
  }
  .event-header {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .event-label { flex: 0 0 auto; }
  .event-header .prompt-num {
    color: var(--tool-accent);
    font-weight: 700;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
    margin-right: 6px;
  }
  .event-header .event-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 0 0 auto;
  }
  .event-copy {
    background: transparent;
    border: 1px solid transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 10px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 3px;
    font-family: inherit;
    line-height: 1;
  }
  .event-copy:hover { color: var(--fg); border-color: var(--border); }
  .event-copy.copied { color: var(--success-fg); border-color: var(--success-fg); }

  .block { margin: 10px 0; }
  .block:first-child { margin-top: 0; }
  .block:last-child { margin-bottom: 0; }

  .block.text, .block.user_prompt {
    white-space: pre-wrap;
    word-break: break-word;
  }
  .block.text p, .block.user_prompt p { margin: 0.5em 0; }
  .block.text p:first-child, .block.user_prompt p:first-child { margin-top: 0; }
  .block.text p:last-child, .block.user_prompt p:last-child { margin-bottom: 0; }

  .block.text code, .block.user_prompt code, .block.thinking code {
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
    font-size: 12.5px;
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
  }
  .block.text pre, .block.user_prompt pre, .block.thinking pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    overflow-x: auto;
    margin: 10px 0;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
    font-size: 12.5px;
    color: var(--code-fg);
  }
  .block.text pre code, .block.user_prompt pre code, .block.thinking pre code {
    background: none; border: none; padding: 0; font-size: inherit;
  }

  .block.thinking {
    opacity: 0.65;
    font-style: italic;
    border-left: 2px solid var(--muted);
    padding-left: 12px;
    font-size: 13px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .block.tool_use {
    background: var(--tool-bg);
    border: 1px solid var(--tool-border);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
    font-size: 12.5px;
  }
  .block.tool_use .tool-name {
    color: var(--tool-accent);
    font-weight: 600;
    margin-bottom: 6px;
    font-size: 12px;
    letter-spacing: 0.02em;
  }
  .block.tool_use pre { margin: 0; white-space: pre-wrap; word-break: break-word; color: var(--code-fg); }
  .block.tool_use .kv { color: var(--muted); }
  .block.tool_use .diff-minus { color: var(--diff-minus); }
  .block.tool_use .diff-plus { color: var(--diff-plus); }

  .block.tool_result {
    background: var(--result-bg);
    border: 1px solid var(--result-border);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
    font-size: 12.5px;
    max-height: 320px;
    overflow: auto;
    position: relative;
    color: var(--code-fg);
  }
  .block.tool_result pre { margin: 0; white-space: pre-wrap; word-break: break-word; color: inherit; }
  .block.tool_result.is-error { border-color: var(--error-border); }
  .block.tool_result.is-error::before {
    content: "Fehler";
    display: inline-block;
    margin-bottom: 4px;
    padding: 1px 6px;
    background: var(--error-badge-bg);
    color: var(--error-fg);
    border-radius: 3px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .block.tool_result.collapsed { max-height: 100px; overflow: hidden; }
  .block.tool_result.collapsed::after {
    content: "";
    position: absolute; left: 0; right: 0; bottom: 0; height: 48px;
    background: linear-gradient(to bottom, transparent, var(--result-bg));
    pointer-events: none;
  }
  .block.tool_result .expand {
    display: inline-block;
    margin-top: 8px;
    background: none; border: none; color: var(--tool-accent);
    font-size: 11px; cursor: pointer; padding: 0;
    font-family: inherit;
  }
  .block.tool_result .expand:hover { text-decoration: underline; }

  .empty {
    color: var(--muted); text-align: center; margin-top: 60px;
    font-style: italic;
  }
  strong { color: var(--strong-color); }
  a { color: var(--link); }

  @media (max-width: 720px) {
    .sidepanel { position: static; width: auto; height: 160px; border-right: none; border-bottom: 1px solid var(--border); margin-top: 40px; }
    .container { margin-left: auto; padding-top: 12px; }
  }
</style>
</head>
<body>
<div class="toolbar">
  <div class="toolbar-left">
    <span class="brand">ccview</span>
    <span class="brand-stats" id="stats"></span>
  </div>
  <div class="toolbar-right">
    <div class="theme-switch" id="themeSwitch">
      <button data-theme="dark">Dark</button>
      <button data-theme="light">Light</button>
      <button data-theme="sepia">Sepia</button>
    </div>
    <div class="status" id="status">connecting…</div>
    <button class="menu-toggle" id="menuToggle" title="Menü" aria-label="Menü">☰</button>
    <div class="menu-items" id="menuItems">
      <button data-action="save">Speichern</button>
      <button data-action="save-as">Speichern unter…</button>
      <div class="sep"></div>
      <button data-action="about">Über ccview</button>
    </div>
  </div>
</div>
<div class="favbar" id="favbar"></div>
<div class="searchbar" id="searchbar" hidden>
  <input type="text" id="searchInput" placeholder="Suchen… (/ öffnen, Esc schließen)">
  <span class="count" id="searchCount"></span>
  <button id="searchClose" title="schließen">×</button>
</div>
<button class="jump-live" id="jumpLive" title="Zu Live springen">↓ Live</button>
<div class="bottombar" id="bottombar">
  <button data-action="scroll-pause" id="scrollPauseBtn" title="Auto-Scroll ein-/ausschalten">⏸ Scroll</button>
  <button data-action="top" title="Anfang (gg)">⇈ Anfang</button>
  <button data-action="bottom" title="Live / Ende (G)">⇊ Live</button>
  <span class="spacer"></span>
  <span class="hint">/ suchen · j/k Prompt · gg/G Start/Ende · Esc</span>
</div>
<div class="modal" id="aboutModal" hidden>
  <div class="modal-backdrop" data-modal-close="1"></div>
  <div class="modal-body">
    <h2>ccview <span class="ver" id="verSpan">v…</span></h2>
    <p>Live-Viewer für Claude Code Sessions.</p>
    <p>Gebaut von <strong>Ulrich Cuber</strong> &middot; cuber IT service</p>
    <ul>
      <li><a href="https://www.uc-it.de" target="_blank" rel="noopener">www.uc-it.de</a></li>
      <li><a href="https://github.com/cuber-it/ccview" target="_blank" rel="noopener">github.com/cuber-it/ccview</a></li>
    </ul>
    <p class="modal-license">Lizenz: Apache 2.0</p>
    <button class="modal-close" data-modal-close="1">Schließen</button>
  </div>
</div>
<aside class="sidepanel">
  <button class="sidepanel-toggle" id="panelToggle" title="Panel ein-/ausklappen">«</button>
  <div class="sidepanel-tabs" id="sidepanelTabs">
    <button data-tab="prompts" class="active">Prompts</button>
    <button data-tab="sessions">Sessions</button>
  </div>
  <div id="tabPrompts">
    <h2>Prompts</h2>
    <input class="prompt-filter" id="promptFilter" placeholder="filtern…">
    <div id="promptList"><div class="sidepanel-empty">noch keine</div></div>
  </div>
  <div id="tabSessions" style="display:none">
    <h2>Sessions</h2>
    <div id="sessionList"><div class="sidepanel-empty">lade…</div></div>
  </div>
</aside>
<div class="container" id="events"></div>
<script>
(() => {
  // ---------- theme ----------
  const html = document.documentElement;
  const switchEl = document.getElementById("themeSwitch");
  const applyTheme = (name) => {
    html.setAttribute("data-theme", name);
    localStorage.setItem("ccview.theme", name);
    switchEl.querySelectorAll("button").forEach(b => {
      b.classList.toggle("active", b.dataset.theme === name);
    });
  };
  applyTheme(localStorage.getItem("ccview.theme") || "dark");
  switchEl.addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-theme]");
    if (btn) applyTheme(btn.dataset.theme);
  });

  // ---------- sidepanel collapse ----------
  const panelToggle = document.getElementById("panelToggle");
  const applyPanel = (collapsed) => {
    document.body.classList.toggle("sp-collapsed", collapsed);
    panelToggle.textContent = collapsed ? "»" : "«";
    localStorage.setItem("ccview.sidepanel", collapsed ? "collapsed" : "open");
  };
  applyPanel(localStorage.getItem("ccview.sidepanel") === "collapsed");
  panelToggle.addEventListener("click", () => {
    applyPanel(!document.body.classList.contains("sp-collapsed"));
  });

  // ---------- burger menu / export ----------
  const menuToggle = document.getElementById("menuToggle");
  const menuItems = document.getElementById("menuItems");
  const openMenu = (open) => {
    menuItems.classList.toggle("open", open);
    menuToggle.classList.toggle("open", open);
  };
  menuToggle.addEventListener("click", (e) => {
    e.stopPropagation();
    openMenu(!menuItems.classList.contains("open"));
  });
  document.addEventListener("click", (e) => {
    if (!menuItems.contains(e.target) && e.target !== menuToggle) openMenu(false);
  });

  const exportSession = async (pathOverride) => {
    try {
      const r = await fetch("/api/export", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(pathOverride ? { path: pathOverride } : {}),
      });
      if (!r.ok) throw new Error(await r.text() || r.status);
      const data = await r.json();
      setStatus("gespeichert: " + data.path, "ok");
    } catch (err) {
      setStatus("Export-Fehler: " + err, "err");
    }
  };

  // ---------- about modal ----------
  const aboutModal = document.getElementById("aboutModal");
  const verSpan = document.getElementById("verSpan");
  const openAbout = async () => {
    try {
      const r = await fetch("/api/version");
      if (r.ok) {
        const d = await r.json();
        verSpan.textContent = "v" + (d.version || "dev");
      }
    } catch { verSpan.textContent = "vdev"; }
    aboutModal.hidden = false;
  };
  const closeAbout = () => { aboutModal.hidden = true; };
  aboutModal.addEventListener("click", (e) => {
    if (e.target.dataset.modalClose) closeAbout();
  });

  menuItems.addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-action]");
    if (!btn) return;
    openMenu(false);
    if (btn.dataset.action === "save") {
      exportSession(null);
    } else if (btn.dataset.action === "save-as") {
      const p = prompt("Dateiname oder Pfad (leer = Default):", "");
      if (p === null) return;
      exportSession(p.trim() || null);
    } else if (btn.dataset.action === "about") {
      openAbout();
    }
  });

  // ---------- favorites ----------
  const favbarEl = document.getElementById("favbar");
  const MAX_FAVS = 5;
  let lastSessionsData = [];

  const loadFavs = () => {
    try { return JSON.parse(localStorage.getItem("ccview.favs") || "[]"); }
    catch { return []; }
  };
  const saveFavs = (favs) => localStorage.setItem("ccview.favs", JSON.stringify(favs));

  const epochOf = (iso) => iso ? new Date(iso).getTime() : 0;

  const renderFavs = () => {
    const favs = loadFavs();
    favbarEl.innerHTML = "";
    if (!favs.length) {
      const empty = document.createElement("div");
      empty.className = "favbar-empty";
      empty.textContent = "Keine Favoriten — im Sessions-Tab pinnen (☆)";
      favbarEl.appendChild(empty);
      return;
    }
    favs.forEach(fav => {
      const live = lastSessionsData.find(s => s.id === fav.id);
      const chip = document.createElement("div");
      chip.className = "fav-chip";
      if (live && live.current) chip.classList.add("active");
      const liveLast = live ? epochOf(live.last_event) : 0;
      if (liveLast > (fav.lastSeen || 0) && !(live && live.current)) chip.classList.add("updated");

      const shortEl = document.createElement("span");
      shortEl.className = "fav-short";
      shortEl.textContent = fav.shortId;
      chip.appendChild(shortEl);

      const body = document.createElement("span");
      body.className = "fav-body";
      body.textContent = fav.label || "";
      chip.appendChild(body);

      const unpin = document.createElement("button");
      unpin.className = "fav-unpin";
      unpin.textContent = "×";
      unpin.title = "Entfernen";
      unpin.addEventListener("click", (e) => {
        e.stopPropagation();
        saveFavs(loadFavs().filter(f => f.id !== fav.id));
        renderFavs();
        if (sessionsLoaded) loadSessions();
      });
      chip.appendChild(unpin);

      chip.addEventListener("click", () => {
        switchSession(fav.id);
        markFavSeen(fav.id, live ? live.last_event : null);
      });
      favbarEl.appendChild(chip);
    });
  };

  const markFavSeen = (id, iso) => {
    const favs = loadFavs();
    const f = favs.find(f => f.id === id);
    if (!f) return;
    f.lastSeen = iso ? epochOf(iso) : Date.now();
    saveFavs(favs);
    renderFavs();
  };

  const toggleFav = (session) => {
    const favs = loadFavs();
    const existing = favs.findIndex(f => f.id === session.id);
    if (existing >= 0) {
      favs.splice(existing, 1);
      saveFavs(favs);
    } else {
      if (favs.length >= MAX_FAVS) {
        setStatus(`max ${MAX_FAVS} Favoriten`, "err");
        return;
      }
      const norm = (session.first_prompt || "").replace(/\s+/g, " ").trim();
      favs.push({
        id: session.id,
        shortId: session.short_id,
        projectLabel: session.project_label,
        label: norm.length > 28 ? norm.slice(0, 28) + "..." : (norm || session.project_label || session.short_id),
        lastSeen: epochOf(session.last_event) || Date.now(),
      });
      saveFavs(favs);
    }
    renderFavs();
    loadSessions();
  };

  const isFav = (id) => loadFavs().some(f => f.id === id);

  // ---------- main session (second star, exclusive) ----------
  const getMain = () => localStorage.getItem("ccview.mainSession") || "";
  const setMain = (id) => {
    if (id) localStorage.setItem("ccview.mainSession", id);
    else localStorage.removeItem("ccview.mainSession");
  };
  const toggleMain = (sessionId) => {
    setMain(getMain() === sessionId ? "" : sessionId);
    loadSessions();
  };

  const refreshSessionsForFavs = async () => {
    if (document.hidden) return;
    try {
      const r = await fetch("/api/sessions");
      if (!r.ok) return;
      lastSessionsData = await r.json();
      // auto-update lastSeen for the currently-open favorite
      const cur = lastSessionsData.find(s => s.current);
      if (cur && isFav(cur.id)) markFavSeen(cur.id, cur.last_event);
      else renderFavs();
    } catch { /* ignore */ }
  };

  renderFavs();
  refreshSessionsForFavs();
  setInterval(refreshSessionsForFavs, 15000);

  // ---------- sidepanel tabs ----------
  const tabsEl = document.getElementById("sidepanelTabs");
  const tabPrompts = document.getElementById("tabPrompts");
  const tabSessions = document.getElementById("tabSessions");
  const sessionList = document.getElementById("sessionList");
  let sessionsLoaded = false;

  const formatRelative = (iso) => {
    if (!iso || iso.startsWith("0001-01-01")) return "";
    const d = new Date(iso);
    const diff = (Date.now() - d.getTime()) / 1000;
    if (diff < 60)     return "jetzt";
    if (diff < 3600)   return Math.floor(diff / 60) + "m";
    if (diff < 86400)  return Math.floor(diff / 3600) + "h";
    if (diff < 604800) return Math.floor(diff / 86400) + "d";
    return d.toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit" });
  };

  const isToday = (iso) => {
    if (!iso || iso.startsWith("0001-01-01")) return false;
    const d = new Date(iso);
    const n = new Date();
    return d.getFullYear() === n.getFullYear()
        && d.getMonth() === n.getMonth()
        && d.getDate() === n.getDate();
  };

  const switchSession = async (fullId) => {
    try {
      const r = await fetch("/api/switch", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: fullId }),
      });
      if (!r.ok) throw new Error(await r.text() || r.status);
      localStorage.setItem("ccview.lastSession", fullId);
      setTimeout(loadSessions, 150);
    } catch (err) {
      setStatus("Switch-Fehler: " + err, "err");
    }
  };

  // On startup with no active session, pick a default:
  //  1. the newest session in the current project (`same_project` flag), or
  //  2. the last-opened session from localStorage if still available.
  // Startup priority: explicit main > current project's newest > last in localStorage.
  const restoreLastSession = async () => {
    try {
      const r = await fetch("/api/sessions");
      if (!r.ok) return;
      const list = await r.json();
      lastSessionsData = list;
      const cur = list.find(s => s.current);
      if (cur) {
        localStorage.setItem("ccview.lastSession", cur.id);
        return;
      }
      const main = getMain();
      if (main && list.some(s => s.id === main)) { switchSession(main); return; }
      const sameProject = list.find(s => s.same_project);
      if (sameProject) { switchSession(sameProject.id); return; }
      const last = localStorage.getItem("ccview.lastSession");
      if (last && list.some(s => s.id === last)) switchSession(last);
    } catch { /* ignore */ }
  };

  const loadSessions = async () => {
    try {
      const res = await fetch("/api/sessions");
      if (!res.ok) throw new Error(res.status);
      const list = await res.json();
      lastSessionsData = list;
      if (!list.length) {
        sessionList.innerHTML = '<div class="sidepanel-empty">keine</div>';
        return;
      }
      sessionList.innerHTML = "";
      const mainID = getMain();
      list.forEach(s => {
        const item = document.createElement("div");
        let cls = "session-item";
        if (s.current) cls += " current";
        if (s.same_project) cls += " same-project";
        if (isToday(s.last_event) || isToday(s.first_event)) cls += " today";
        if (s.id === mainID) cls += " is-main";
        item.className = cls;
        item.dataset.fullId = s.id;

        const norm = (s.first_prompt || "").replace(/\s+/g, " ").trim();
        item.dataset.popupTitle = s.short_id + (s.current ? " · offen" : "");
        item.dataset.popupBody = norm || "(kein Prompt gefunden)";
        item.dataset.popupMeta = (s.project_label || "") + (s.first_event ? " · start " + formatRelative(s.first_event) : "");
        item.dataset.popupCmd = `ccview -s ${s.short_id}`;

        const id = document.createElement("div");
        id.className = "session-id";
        const left = document.createElement("span"); left.textContent = s.short_id;
        const right = document.createElement("span");
        right.textContent = s.current ? "offen" : formatRelative(s.first_event || s.last_event);
        if (s.current) right.classList.add("current-badge");
        id.appendChild(left); id.appendChild(right);
        item.appendChild(id);

        const prev = document.createElement("div");
        prev.className = "session-preview";
        prev.textContent = norm ? (norm.length > 30 ? norm.slice(0, 30) + "..." : norm) : "(kein Prompt)";
        item.appendChild(prev);

        const proj = document.createElement("div");
        proj.className = "session-project";
        proj.textContent = s.project_label || s.project || "";
        item.appendChild(proj);

        const main = document.createElement("button");
        const isMain = s.id === mainID;
        main.className = "main-btn" + (isMain ? " active" : "");
        main.textContent = isMain ? "★" : "☆";
        main.title = isMain ? "Main-Session entfernen" : "Als Main-Session setzen (wird beim Start geladen)";
        main.addEventListener("click", (e) => {
          e.stopPropagation();
          toggleMain(s.id);
        });
        item.appendChild(main);

        const pin = document.createElement("button");
        pin.className = "pin-btn" + (isFav(s.id) ? " pinned" : "");
        pin.textContent = isFav(s.id) ? "★" : "☆";
        pin.title = isFav(s.id) ? "Favorit entfernen" : "Als Favorit pinnen";
        pin.addEventListener("click", (e) => {
          e.stopPropagation();
          toggleFav(s);
        });
        item.appendChild(pin);

        sessionList.appendChild(item);
      });
      renderFavs();
    } catch (err) {
      sessionList.innerHTML = '<div class="sidepanel-empty">Fehler: ' + err + '</div>';
    }
  };

  sessionList.addEventListener("click", (e) => {
    const item = e.target.closest(".session-item");
    if (!item || !item.dataset.fullId) return;
    switchSession(item.dataset.fullId);
  });

  const activateTab = (name) => {
    tabsEl.querySelectorAll("button").forEach(b => {
      b.classList.toggle("active", b.dataset.tab === name);
    });
    tabPrompts.style.display  = name === "prompts"  ? "" : "none";
    tabSessions.style.display = name === "sessions" ? "" : "none";
    localStorage.setItem("ccview.tab", name);
    if (name === "sessions") {
      loadSessions(); // refresh every activation
      sessionsLoaded = true;
    }
  };
  tabsEl.addEventListener("click", (e) => {
    const b = e.target.closest("button[data-tab]");
    if (b) activateTab(b.dataset.tab);
  });
  activateTab(localStorage.getItem("ccview.tab") || "prompts");
  restoreLastSession();

  // ---------- DOM refs ----------
  const eventsEl   = document.getElementById("events");
  const statusEl   = document.getElementById("status");
  const promptList = document.getElementById("promptList");
  let emptyEl = null;
  let promptCount = 0;
  let promptListEmpty = true;

  const setStatus = (text, cls) => {
    statusEl.textContent = text;
    statusEl.className = "status" + (cls ? " " + cls : "");
  };
  const showEmpty = () => {
    if (emptyEl) return;
    emptyEl = document.createElement("div");
    emptyEl.className = "empty";
    emptyEl.textContent = "Session ist leer. Warte auf Events…";
    eventsEl.appendChild(emptyEl);
  };
  const clearEmpty = () => { if (emptyEl) { emptyEl.remove(); emptyEl = null; } };

  const resetPromptList = () => {
    promptCount = 0;
    promptListEmpty = true;
    promptList.innerHTML = '<div class="sidepanel-empty">noch keine</div>';
  };

  const addPromptLink = (num, text) => {
    if (promptListEmpty) { promptList.innerHTML = ""; promptListEmpty = false; }
    const a = document.createElement("a");
    a.className = "sidepanel-item";
    a.href = `#prompt-${num}`;
    const numSpan = document.createElement("span");
    numSpan.className = "num";
    numSpan.textContent = `#${String(num).padStart(4, "0")}`;
    a.appendChild(numSpan);
    const norm = (text || "").replace(/\s+/g, " ").trim();
    const preview = norm.length > 20 ? norm.slice(0, 20) + "..." : (norm || "(leer)");
    a.appendChild(document.createTextNode(preview));
    a.dataset.popupTitle = `Prompt #${String(num).padStart(4, "0")}`;
    a.dataset.popupBody = text || "(leer)";
    promptList.appendChild(a);
  };

  // ---------- markdown ----------
  const escapeHtml = (s) => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

  const renderInline = (text) => {
    let s = escapeHtml(text);
    s = s.replace(/`([^`\n]+)`/g, (_, c) => `<code>${c}</code>`);
    s = s.replace(/\*\*([^*\n]+)\*\*/g, (_, c) => `<strong>${c}</strong>`);
    s = s.replace(/(^|[\s(])\*([^*\n]+)\*(?=[\s.,;:)!?]|$)/g, (_, pre, c) => `${pre}<em>${c}</em>`);
    return s;
  };

  const renderMarkdown = (text) => {
    if (!text) return "";
    const parts = text.split(/(```[a-zA-Z0-9_-]*\n[\s\S]*?```)/g);
    return parts.map(part => {
      const m = part.match(/^```([a-zA-Z0-9_-]*)\n([\s\S]*?)```$/);
      if (m) {
        const lang = m[1] ? ` data-lang="${escapeHtml(m[1])}"` : "";
        return `<pre${lang}><code>${escapeHtml(m[2].replace(/\n$/, ""))}</code></pre>`;
      }
      return part.split(/\n\n+/).filter(p => p).map(p => `<p>${renderInline(p)}</p>`).join("");
    }).join("");
  };

  const truncate = (s, n) => s.length > n ? s.slice(0, n) + "…" : s;

  const prettyToolInput = (name, input) => {
    if (!input || typeof input !== "object") return escapeHtml(JSON.stringify(input, null, 2));
    const lines = [];
    const push = (label, value, mono = false) => {
      if (value === undefined || value === null || value === "") return;
      lines.push(`<span class="kv">${escapeHtml(label)}:</span> ${mono ? `<code>${escapeHtml(String(value))}</code>` : escapeHtml(String(value))}`);
    };
    switch (name) {
      case "Bash":  return `<pre>$ ${escapeHtml(input.command || "")}</pre>`;
      case "Read":  return `<pre>${escapeHtml(input.file_path || "")}${input.offset ? ` @${input.offset}` : ""}${input.limit ? ` limit=${input.limit}` : ""}</pre>`;
      case "Edit":
        push("file", input.file_path);
        if (input.replace_all) push("replace_all", true);
        if (input.old_string !== undefined) lines.push(`<pre><span class="diff-minus">- ${escapeHtml(truncate(input.old_string, 200))}</span></pre>`);
        if (input.new_string !== undefined) lines.push(`<pre><span class="diff-plus">+ ${escapeHtml(truncate(input.new_string, 200))}</span></pre>`);
        return lines.join("<br>");
      case "Write":
        push("file", input.file_path);
        if (input.content) lines.push(`<pre>${escapeHtml(truncate(input.content, 400))}</pre>`);
        return lines.join("<br>");
      case "Grep":
        push("pattern", input.pattern, true);
        push("path", input.path); push("type", input.type); push("glob", input.glob);
        return lines.join("<br>");
      case "Glob":
        push("pattern", input.pattern, true); push("path", input.path);
        return lines.join("<br>");
      default:
        return `<pre>${escapeHtml(JSON.stringify(input, null, 2))}</pre>`;
    }
  };

  // ---------- block / event elements ----------
  const blockEl = (b) => {
    const el = document.createElement("div");
    el.className = "block " + (b.kind || "unknown");
    switch (b.kind) {
      case "text":
      case "user_prompt":
        el.innerHTML = renderMarkdown(b.text || "");
        break;
      case "thinking":
        el.textContent = b.text || "";
        break;
      case "tool_use": {
        const name = document.createElement("div");
        name.className = "tool-name";
        name.textContent = b.tool_name || "tool";
        el.appendChild(name);
        const body = document.createElement("div");
        body.innerHTML = prettyToolInput(b.tool_name, b.tool_input);
        el.appendChild(body);
        break;
      }
      case "image": {
        const img = document.createElement("img");
        img.alt = "(image)";
        img.style.maxWidth = "100%";
        img.style.borderRadius = "6px";
        img.style.border = "1px solid var(--border)";
        if (b.image_source === "url") {
          img.src = b.image_data || "";
        } else if (b.image_data) {
          const mt = b.image_media_type || "image/png";
          img.src = `data:${mt};base64,${b.image_data}`;
        }
        el.appendChild(img);
        break;
      }
      case "tool_result": {
        if (b.is_error) el.classList.add("is-error");
        const body = (b.text || "").replace(/\s+$/, "");
        const long = body.split("\n").length > 10 || body.length > 500;
        if (long) el.classList.add("collapsed");
        const pre = document.createElement("pre");
        pre.textContent = body;
        el.appendChild(pre);
        if (long) {
          const btn = document.createElement("button");
          btn.className = "expand";
          btn.textContent = "ausklappen";
          btn.onclick = () => {
            const collapsed = el.classList.toggle("collapsed");
            btn.textContent = collapsed ? "ausklappen" : "einklappen";
          };
          el.appendChild(btn);
        }
        break;
      }
      default:
        el.textContent = JSON.stringify(b);
    }
    return el;
  };

  const formatTs = (iso) => {
    if (!iso || iso.startsWith("0001-01-01")) return "";
    try {
      const d = new Date(iso);
      return d.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    } catch { return ""; }
  };

  const eventToText = (ev) => {
    const parts = [];
    (ev.blocks || []).forEach(b => {
      switch (b.kind) {
        case "user_prompt":
        case "text":
          if ((b.text || "").trim()) parts.push(b.text.trim());
          break;
        case "thinking":
          if ((b.text || "").trim()) parts.push("[thinking]\n" + b.text.trim());
          break;
        case "tool_use": {
          const name = b.tool_name || "tool";
          const inp = b.tool_input;
          if (inp && typeof inp === "object") {
            if (name === "Bash" && inp.command) parts.push("[" + name + "]\n$ " + inp.command);
            else if (name === "Read" && inp.file_path) parts.push("[" + name + "] " + inp.file_path);
            else parts.push("[" + name + "]\n" + JSON.stringify(inp, null, 2));
          } else {
            parts.push("[" + name + "]");
          }
          break;
        }
        case "tool_result":
          if ((b.text || "").trim()) {
            parts.push((b.is_error ? "[result error]\n" : "[result]\n") + b.text.trim());
          }
          break;
      }
    });
    return parts.join("\n\n");
  };

  const hasMeaningfulText = (b) => {
    if (!b) return false;
    if (b.kind === "text" || b.kind === "user_prompt" || b.kind === "thinking") {
      return (b.text || "").trim().length > 0;
    }
    return true; // tool_use, tool_result, image always count
  };

  const isRealUserPrompt = (ev) =>
    ev.kind === "user" &&
    Array.isArray(ev.blocks) &&
    ev.blocks.length > 0 &&
    ev.blocks[0].kind === "user_prompt" &&
    (ev.blocks[0].text || "").trim().length > 0;

  const isToolResultUser = (ev) =>
    ev.kind === "user" &&
    Array.isArray(ev.blocks) &&
    ev.blocks.length > 0 &&
    !isRealUserPrompt(ev);

  const eventEl = (ev) => {
    const el = document.createElement("div");
    let cls = "event " + (ev.kind || "unknown");
    if (isRealUserPrompt(ev))      cls += " prompt";
    else if (isToolResultUser(ev)) cls += " tool-context";
    el.className = cls;

    const head = document.createElement("div");
    head.className = "event-header";

    const left = document.createElement("span");
    left.className = "event-label";
    if (isRealUserPrompt(ev)) {
      promptCount += 1;
      const num = promptCount;
      el.id = `prompt-${num}`;
      const badge = document.createElement("span");
      badge.className = "prompt-num";
      badge.textContent = `#${String(num).padStart(4, "0")}`;
      left.appendChild(badge);
      left.appendChild(document.createTextNode("user"));
      addPromptLink(num, ev.blocks[0].text || "");
    } else if (isToolResultUser(ev)) {
      left.textContent = "tool-result";
    } else {
      left.textContent = ev.kind || "?";
    }

    const right = document.createElement("span");
    right.className = "event-right";

    const ts = document.createElement("span");
    ts.textContent = formatTs(ev.timestamp);
    right.appendChild(ts);

    const copyBtn = document.createElement("button");
    copyBtn.className = "event-copy";
    copyBtn.textContent = "kopieren";
    copyBtn.title = "Inhalt in Zwischenablage kopieren";
    copyBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      const text = eventToText(ev);
      navigator.clipboard.writeText(text).then(() => {
        copyBtn.textContent = "kopiert";
        copyBtn.classList.add("copied");
        setTimeout(() => {
          copyBtn.textContent = "kopieren";
          copyBtn.classList.remove("copied");
        }, 1200);
      }).catch(() => {
        copyBtn.textContent = "Fehler";
        setTimeout(() => { copyBtn.textContent = "kopieren"; }, 1500);
      });
    });
    right.appendChild(copyBtn);

    head.appendChild(left); head.appendChild(right);
    el.appendChild(head);
    (ev.blocks || []).filter(hasMeaningfulText).forEach(b => el.appendChild(blockEl(b)));
    return el;
  };

  // ---------- hover popup ----------
  const popup = document.createElement("div");
  popup.className = "popup";
  popup.innerHTML = '<div class="popup-meta"><span class="popup-title"></span><span class="popup-extra"></span></div><div class="popup-body"></div><div class="popup-cmd" style="display:none"></div>';
  document.body.appendChild(popup);
  const popupTitle = popup.querySelector(".popup-title");
  const popupExtra = popup.querySelector(".popup-extra");
  const popupBody  = popup.querySelector(".popup-body");
  const popupCmd   = popup.querySelector(".popup-cmd");

  let popupTimer = null;
  const showPopup = (el) => {
    const title = el.dataset.popupTitle || "";
    const body  = el.dataset.popupBody  || "";
    const meta  = el.dataset.popupMeta  || "";
    const cmd   = el.dataset.popupCmd   || "";
    popupTitle.textContent = title;
    popupExtra.textContent = meta;
    popupBody.textContent  = body.length > 600 ? body.slice(0, 600) + " …" : body;
    if (cmd) { popupCmd.textContent = cmd; popupCmd.style.display = ""; }
    else     { popupCmd.style.display = "none"; }
    popup.classList.add("visible");
    const rect = el.getBoundingClientRect();
    const panelW = document.querySelector(".sidepanel").getBoundingClientRect().width;
    let left = panelW + 8;
    let top  = rect.top;
    // keep on screen
    if (top + 200 > window.innerHeight) top = window.innerHeight - 210;
    if (top < 50) top = 50;
    popup.style.left = left + "px";
    popup.style.top  = top  + "px";
  };
  const hidePopup = () => popup.classList.remove("visible");

  const sidepanelEl = document.querySelector(".sidepanel");
  sidepanelEl.addEventListener("mouseover", (e) => {
    const el = e.target.closest(".sidepanel-item, .session-item");
    if (!el) return;
    clearTimeout(popupTimer);
    popupTimer = setTimeout(() => showPopup(el), 180);
  });
  sidepanelEl.addEventListener("mouseout", (e) => {
    const el = e.target.closest(".sidepanel-item, .session-item");
    if (!el) return;
    clearTimeout(popupTimer);
    hidePopup();
  });

  const shouldRender = (ev) => ev.blocks && ev.blocks.some(hasMeaningfulText);

  // ---------- event counter ----------
  const statsEl = document.getElementById("stats");
  let eventCount = 0;
  const bumpStats = (delta) => {
    if (delta === 0) { eventCount = 0; }
    else eventCount += delta;
    statsEl.textContent = `${eventCount} events · ${promptCount} prompts`;
  };

  // ---------- auto-scroll-pause ----------
  const jumpLiveBtn = document.getElementById("jumpLive");
  const scrollPauseBtn = document.getElementById("scrollPauseBtn");
  const bottombar = document.getElementById("bottombar");
  let atBottom = true;
  let scrollPaused = false;
  const BOTTOM_SLOP = 60;
  const isAtBottom = () => (window.innerHeight + window.scrollY) >= document.body.scrollHeight - BOTTOM_SLOP;
  const checkBottom = () => {
    atBottom = isAtBottom();
    if (atBottom && !scrollPaused) jumpLiveBtn.classList.remove("visible");
  };
  window.addEventListener("scroll", checkBottom, { passive: true });
  const jumpToLive = () => {
    window.scrollTo(0, document.body.scrollHeight);
    atBottom = true;
    jumpLiveBtn.classList.remove("visible");
  };
  jumpLiveBtn.addEventListener("click", jumpToLive);

  const setScrollPaused = (v) => {
    scrollPaused = v;
    scrollPauseBtn.classList.toggle("active", scrollPaused);
    scrollPauseBtn.textContent = scrollPaused ? "▶ Scroll" : "⏸ Scroll";
    scrollPauseBtn.title = scrollPaused ? "Auto-Scroll wieder aktivieren" : "Auto-Scroll pausieren";
  };
  bottombar.addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-action]");
    if (!btn) return;
    switch (btn.dataset.action) {
      case "scroll-pause": setScrollPaused(!scrollPaused); break;
      case "top":          window.scrollTo({ top: 0, behavior: "smooth" }); break;
      case "bottom":       jumpToLive(); break;
    }
  });

  // ---------- search ----------
  const searchbar = document.getElementById("searchbar");
  const searchInput = document.getElementById("searchInput");
  const searchCount = document.getElementById("searchCount");
  const searchClose = document.getElementById("searchClose");

  const applySearch = (q) => {
    const lo = q.trim().toLowerCase();
    const events = eventsEl.querySelectorAll(".event");
    if (!lo) {
      events.forEach(el => el.hidden = false);
      searchCount.textContent = "";
      return;
    }
    let n = 0;
    let firstMatch = null;
    events.forEach(el => {
      const txt = el.textContent.toLowerCase();
      const match = txt.includes(lo);
      el.hidden = !match;
      if (match) {
        n++;
        if (!firstMatch) firstMatch = el;
      }
    });
    searchCount.textContent = n + " Treffer";
    if (firstMatch) firstMatch.scrollIntoView({ block: "start" });
  };
  searchInput.addEventListener("input", e => applySearch(e.target.value));
  const openSearch = () => {
    searchbar.hidden = false;
    searchInput.focus();
    searchInput.select();
  };
  const closeSearch = () => {
    searchbar.hidden = true;
    if (searchInput.value) {
      searchInput.value = "";
      applySearch("");
    }
  };
  searchClose.addEventListener("click", closeSearch);

  // ---------- prompt-filter ----------
  const promptFilter = document.getElementById("promptFilter");
  promptFilter.addEventListener("input", (e) => {
    const lo = e.target.value.trim().toLowerCase();
    promptList.querySelectorAll(".sidepanel-item").forEach(el => {
      const txt = (el.textContent + " " + (el.dataset.popupBody || "")).toLowerCase();
      el.hidden = lo && !txt.includes(lo);
    });
  });

  // ---------- keyboard nav ----------
  let lastKey = null;
  const jumpPrompt = (dir) => {
    const prompts = [...eventsEl.querySelectorAll(".event.prompt")].filter(el => !el.hidden);
    if (!prompts.length) return;
    const chromeH = 84;
    let idx = -1;
    for (let i = 0; i < prompts.length; i++) {
      if (prompts[i].getBoundingClientRect().top - chromeH > 4) break;
      idx = i;
    }
    const target = prompts[Math.max(0, Math.min(prompts.length - 1, idx + dir))];
    if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
  };
  document.addEventListener("keydown", (e) => {
    const t = e.target;
    const typing = t.tagName === "INPUT" || t.tagName === "TEXTAREA";
    if (e.key === "Escape") {
      if (!aboutModal.hidden) { closeAbout(); return; }
      if (!searchbar.hidden) closeSearch();
      openMenu(false);
      return;
    }
    if (typing) return;
    if (e.key === "/") { e.preventDefault(); openSearch(); return; }
    if (e.key === "j") { jumpPrompt(+1); return; }
    if (e.key === "k") { jumpPrompt(-1); return; }
    if (e.key === "G") { window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" }); return; }
    if (e.key === "g") {
      if (lastKey === "g") { window.scrollTo({ top: 0, behavior: "smooth" }); lastKey = null; }
      else { lastKey = "g"; setTimeout(() => { lastKey = null; }, 600); }
      return;
    }
    lastKey = null;
  });

  const clearView = () => {
    eventsEl.innerHTML = "";
    resetPromptList();
    emptyEl = null;
    showEmpty();
    bumpStats(0);
    atBottom = true;
    jumpLiveBtn.classList.remove("visible");
    if (promptFilter.value) promptFilter.value = "";
    if (searchInput.value) { searchInput.value = ""; searchCount.textContent = ""; }
  };

  bumpStats(0); // show "0 events · 0 prompts" on page load

  const connect = () => {
    const es = new EventSource("/stream");
    es.onopen = () => {
      setStatus("verbunden", "ok");
      clearView();
    };
    es.addEventListener("reset", () => {
      clearView();
      loadSessions(); // refresh sessions tab after switch
    });
    es.onmessage = (e) => {
      clearEmpty();
      try {
        const ev = JSON.parse(e.data);
        if (!shouldRender(ev)) return;
        const node = eventEl(ev);
        // apply current search filter to new node
        if (searchInput.value) {
          const lo = searchInput.value.toLowerCase();
          node.hidden = !node.textContent.toLowerCase().includes(lo);
        }
        eventsEl.appendChild(node);
        bumpStats(+1);
        if (atBottom && !scrollPaused) {
          window.scrollTo(0, document.body.scrollHeight);
        } else {
          jumpLiveBtn.classList.add("visible");
        }
      } catch (err) {
        console.error("parse error", err);
      }
    };
    es.onerror = () => setStatus("getrennt — reconnecting…", "err");
  };
  connect();
})();
</script>
</body>
</html>
