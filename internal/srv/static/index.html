<!doctype html>
<html lang="de" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ccview</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="toolbar">
  <div class="toolbar-left">
    <span class="brand">ccview</span>
    <span class="brand-stats" id="stats"></span>
  </div>
  <div class="toolbar-right">
    <div class="theme-switch" id="langSwitch">
      <button data-lang="de">DE</button>
      <button data-lang="en">EN</button>
    </div>
    <div class="theme-switch" id="themeSwitch">
      <button data-theme="dark">Dark</button>
      <button data-theme="light">Light</button>
      <button data-theme="sepia">Sepia</button>
    </div>
    <div class="status" id="status" data-i18n="status_connecting">connecting…</div>
    <button class="menu-toggle" id="menuToggle" data-i18n-title="menu" title="Menü" aria-label="menu">☰</button>
    <div class="menu-items" id="menuItems">
      <button data-action="save" data-i18n="menu_save">Speichern</button>
      <button data-action="save-as" data-i18n="menu_save_as">Speichern unter…</button>
      <div class="sep"></div>
      <button data-action="about" data-i18n="menu_about">Über ccview</button>
    </div>
  </div>
</div>
<div class="favbar" id="favbar"></div>
<div class="searchbar" id="searchbar" hidden>
  <input type="text" id="searchInput" data-i18n-placeholder="search_placeholder" placeholder="Suchen…">
  <span class="count" id="searchCount"></span>
  <button id="searchClose" data-i18n-title="close" title="close">×</button>
</div>
<button class="jump-live" id="jumpLive" data-i18n-title="jump_live" title="Zu Live springen"><span data-i18n="jump_live_short">↓ Live</span></button>
<div class="bottombar" id="bottombar">
  <button data-action="scroll-pause" id="scrollPauseBtn" data-i18n-title="scroll_toggle" title="Auto-Scroll ein-/ausschalten"><span data-i18n="scroll_pause">⏸ Scroll</span></button>
  <button data-action="top" data-i18n-title="go_top" title="Anfang (gg)"><span data-i18n="go_top_short">⇈ Anfang</span></button>
  <button data-action="bottom" data-i18n-title="go_live" title="Live / Ende (G)"><span data-i18n="go_live_short">⇊ Live</span></button>
  <span class="spacer"></span>
  <span class="hint" data-i18n="kbd_hint">/ suchen · j/k Prompt · gg/G Start/Ende · Esc</span>
</div>
<div class="modal" id="aboutModal" hidden>
  <div class="modal-backdrop" data-modal-close="1"></div>
  <div class="modal-body">
    <h2>ccview <span class="ver" id="verSpan">v…</span></h2>
    <p data-i18n="about_tagline">Live-Viewer für Claude Code Sessions.</p>
    <p><span data-i18n="about_built_by">Gebaut von</span> <strong>Ulrich Cuber</strong> &middot; cuber IT service</p>
    <ul>
      <li><a href="https://www.uc-it.de" target="_blank" rel="noopener">www.uc-it.de</a></li>
      <li><a href="https://github.com/cuber-it/ccview" target="_blank" rel="noopener">github.com/cuber-it/ccview</a></li>
    </ul>
    <p class="modal-license"><span data-i18n="about_license">Lizenz:</span> Apache 2.0</p>
    <button class="modal-close" data-modal-close="1" data-i18n="close">Schließen</button>
  </div>
</div>
<aside class="sidepanel">
  <button class="sidepanel-toggle" id="panelToggle" data-i18n-title="sidepanel_toggle" title="Panel ein-/ausklappen">«</button>
  <div class="sidepanel-tabs" id="sidepanelTabs">
    <button data-tab="prompts" class="active" data-i18n="tab_prompts">Prompts</button>
    <button data-tab="sessions" data-i18n="tab_sessions">Sessions</button>
  </div>
  <div id="tabPrompts">
    <h2 data-i18n="tab_prompts">Prompts</h2>
    <input class="prompt-filter" id="promptFilter" data-i18n-placeholder="prompt_filter" placeholder="filtern…">
    <div id="promptList"><div class="sidepanel-empty" data-i18n="list_none_yet">noch keine</div></div>
  </div>
  <div id="tabSessions" style="display:none">
    <h2 data-i18n="tab_sessions">Sessions</h2>
    <div id="sessionList"><div class="sidepanel-empty" data-i18n="list_loading">lade…</div></div>
  </div>
</aside>
<div class="container" id="events"></div>
<script src="app.js"></script>
</body>
</html>
