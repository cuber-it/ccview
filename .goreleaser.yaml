version: 2

project_name: ccview

before:
  hooks:
    - go mod tidy

builds:
  - id: ccview
    main: ./cmd/ccview
    binary: ccview
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: ccview
    ids: [ccview]
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - INSTALL.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: checksums.txt

dockers_v2:
  - id: ccview
    ids: [ccview]
    images:
      - ghcr.io/cuber-it/ccview
    tags:
      - "{{ .Version }}"
      - latest
    dockerfile: Dockerfile.goreleaser
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.source: "https://github.com/cuber-it/ccview"
      org.opencontainers.image.licenses: "Apache-2.0"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"

release:
  github:
    owner: cuber-it
    name: ccview
  draft: false
  prerelease: auto
  footer: |
    ---
    Built with [GoReleaser](https://goreleaser.com).
